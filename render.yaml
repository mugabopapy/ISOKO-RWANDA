services:
  - type: web
    name: isoko-rwanda
    runtime: node
    plan: free
    buildCommand: 'echo "no build needed"'
    startCommand: npm start
    healthCheckPath: /api/meta
    envVars:
      - key: ADMIN_EMAIL
        value: admin@isoko.rw
      - key: ADMIN_PASSWORD
        sync: false # you will be asked to choose your admin password when deploying
      - key: ADMIN_KEY
        generateValue: true
      - key: SEED_DEMO
        value: 'true' # fills the map with 10 demo shops on first boot; set to 'false' for a clean start
