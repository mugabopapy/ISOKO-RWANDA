<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iSoko Rwanda — Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="market.css" />
</head>
<body class="market">
  <header id="site-header"></header>

  <div class="page">
    <div class="two-col">
      <div>
        <div class="panel" id="shopPanel"></div>
        <div class="panel">
          <h2 id="invTitle"></h2>
          <div id="productList"></div>
        </div>
      </div>

      <div class="cart-box">
        <div class="panel" id="cartPanel"></div>
        <div class="panel">
          <div class="mini-map" id="miniMap"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="common.js"></script>
  <script>
    const { t, api, catLabel, esc, money, renderHeader, getCart, setCart, clearCart, shopPhoto } = window.ISOKO;
    const shopId = new URLSearchParams(location.search).get('id');
    let shop, products = [], user = null;

    function cartItems() {
      const cart = getCart();
      return cart.shopId === shopId ? cart.items : {};
    }
    function setQty(productId, qty) {
      let cart = getCart();
      if (cart.shopId !== shopId) cart = { shopId, items: {} };
      if (qty <= 0) delete cart.items[productId];
      else cart.items[productId] = qty;
      setCart(cart);
      renderProducts();
      renderCart();
    }

    function stockLabel(p) {
      if (p.stock === null) return t('unlimited');
      if (p.stock <= 0) return t('outOfStock');
      return t('inStock', p.stock);
    }

    function renderShop() {
      document.title = `iSoko — ${shop.name}`;
      document.getElementById('shopPanel').innerHTML = `
        <img src="${esc(shopPhoto(shop))}" style="width:calc(100% + 52px);margin:-26px -26px 16px;height:220px;object-fit:cover;border-radius:var(--radius) var(--radius) 0 0" alt="" />
        <span class="cat-tag" style="background:var(--green-soft);color:var(--green-dark);border-radius:999px;padding:4px 12px;font:600 12.5px Inter">${esc(catLabel(shop.category))}</span>
        <h1 style="margin:10px 0 8px">${esc(shop.name)}</h1>
        <p class="intro" style="margin-bottom:10px">${esc(shop.description || '')}</p>
        <p class="meta" style="color:var(--ink-soft);font-size:14px">
          📍 ${esc(shop.address || '')}<br>📞 ${esc(shop.phone || '')}<br>
          ${shop.product_count} ${t('items')} · ${shop.completed_orders} ${t('ordersDone')}
        </p>`;
      const map = L.map('miniMap', { scrollWheelZoom: false }).setView([shop.lat, shop.lng], 15);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);
      L.marker([shop.lat, shop.lng]).addTo(map).bindPopup(esc(shop.name));
    }

    function renderProducts() {
      document.getElementById('invTitle').textContent = t('inventory');
      const list = document.getElementById('productList');
      const items = cartItems();
      if (!products.length) {
        list.innerHTML = `<p class="empty-state">${t('noProducts')}</p>`;
        return;
      }
      list.innerHTML = '';
      for (const p of products) {
        const qty = items[p.id] || 0;
        const out = p.stock !== null && p.stock <= 0;
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          ${p.photo ? `<img src="${esc(p.photo)}" style="width:60px;height:60px;object-fit:cover;border-radius:10px" alt="" />` : ''}
          <div class="item-info">
            <div class="name">${esc(p.name)}${p.unit ? ` <span class="sub">/ ${esc(p.unit)}</span>` : ''}</div>
            <div class="sub">${esc(p.description || '')}</div>
            <div class="sub">${stockLabel(p)}</div>
          </div>
          <span class="price-tag">${money(p.price)}</span>
          ${
            out
              ? ''
              : qty > 0
                ? `<div class="qty-stepper">
                     <button type="button" data-act="dec">−</button><span>${qty}</span><button type="button" data-act="inc">+</button>
                   </div>`
                : `<button class="btn btn-primary btn-sm" data-act="add">${t('addToCart')}</button>`
          }`;
        row.querySelectorAll('button[data-act]').forEach((b) =>
          b.addEventListener('click', () => {
            const cur = cartItems()[p.id] || 0;
            const max = p.stock === null ? 999 : p.stock;
            if (b.dataset.act === 'dec') setQty(p.id, cur - 1);
            else setQty(p.id, Math.min(cur + 1, max));
          })
        );
        list.appendChild(row);
      }
    }

    function renderCart() {
      const panel = document.getElementById('cartPanel');
      const items = cartItems();
      const rows = Object.entries(items)
        .map(([pid, qty]) => ({ p: products.find((x) => x.id === pid), qty }))
        .filter((x) => x.p);
      const subtotal = rows.reduce((s, x) => s + x.p.price * x.qty, 0);

      if (!rows.length) {
        panel.innerHTML = `<h2>${t('cart')}</h2><p class="empty-state">${t('emptyCart')}</p>`;
        return;
      }

      panel.innerHTML = `
        <h2>${t('cart')}</h2>
        ${rows.map((x) => `<div class="cart-line"><span>${x.qty} × ${esc(x.p.name)}</span><span>${money(x.p.price * x.qty)}</span></div>`).join('')}
        <div class="cart-line total"><span>${t('subtotal')}</span><span>${money(subtotal)}</span></div>
        <div id="checkoutArea" style="margin-top:14px"></div>`;

      const area = document.getElementById('checkoutArea');
      if (!user) {
        area.innerHTML = `<a class="btn btn-primary btn-block" href="/auth.html?next=${encodeURIComponent(location.pathname + location.search)}">${t('loginToOrder')}</a>`;
        return;
      }
      area.innerHTML = `
        <div class="field"><label>${t('momoPhone')}</label><input type="tel" id="momoPhone" value="${esc(user.phone || '')}" /></div>
        <div class="field"><label>${t('deliveryMethod')}</label>
          <div class="options">
            <label class="option"><input type="radio" name="dm" value="pickup" checked /><span>${t('pickup')}</span></label>
            <label class="option"><input type="radio" name="dm" value="delivery" /><span>${t('delivery')}</span></label>
          </div>
        </div>
        <div class="field hidden" id="addrField"><label>${t('deliveryAddress')}</label><input type="text" id="addr" /></div>
        <p class="notice err hidden" id="orderErr"></p>
        <button class="btn btn-primary btn-block" id="placeBtn">${t('checkout')}</button>`;

      area.querySelectorAll('input[name=dm]').forEach((r) =>
        r.addEventListener('change', () =>
          document.getElementById('addrField').classList.toggle('hidden', r.value !== 'delivery' || !r.checked)
        )
      );

      document.getElementById('placeBtn').addEventListener('click', async () => {
        const btn = document.getElementById('placeBtn');
        const err = document.getElementById('orderErr');
        err.classList.add('hidden');
        btn.disabled = true;
        try {
          const dm = area.querySelector('input[name=dm]:checked').value;
          const data = await api('/api/orders', {
            method: 'POST',
            body: {
              shopId,
              items: rows.map((x) => ({ productId: x.p.id, qty: x.qty })),
              momo_phone: document.getElementById('momoPhone').value,
              delivery_method: dm,
              delivery_address: dm === 'delivery' ? document.getElementById('addr').value : '',
            },
          });
          clearCart();
          panel.innerHTML = `
            <h2>🎉 ${t('orderPlaced')}</h2>
            <p class="intro">${t('orderPlacedBody', esc(data.order.code))}</p>
            <a class="btn btn-primary btn-block" href="/orders.html">${t('viewMyOrders')}</a>
            <a class="btn btn-ghost btn-block" style="margin-top:10px" href="/">${t('continueShopping')}</a>`;
          const fresh = await api('/api/shops/' + shopId);
          products = fresh.products;
          renderProducts();
        } catch (e) {
          err.textContent = t('errGeneric');
          err.classList.remove('hidden');
          btn.disabled = false;
        }
      });
    }

    (async () => {
      user = await renderHeader('');
      const data = await api('/api/shops/' + shopId);
      shop = data.shop;
      products = data.products;
      renderShop();
      renderProducts();
      renderCart();
    })().catch(() => {
      document.getElementById('shopPanel').innerHTML = '<p class="empty-state">Shop not found.</p>';
    });
  </script>
</body>
</html>
