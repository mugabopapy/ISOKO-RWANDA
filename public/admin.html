<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iSoko Survey — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .card { max-width: 960px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin: 20px 0 30px; }
    .stat {
      border: 1px solid var(--line); border-radius: 14px; padding: 18px;
      background: linear-gradient(180deg, #fff, #f8fdfb);
    }
    .stat .num { font: 800 30px 'Sora', sans-serif; color: var(--green-dark); }
    .stat .lbl { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
    h2 { font-family: 'Sora', sans-serif; font-size: 18px; margin: 26px 0 12px; }
    .bar-row { display: grid; grid-template-columns: minmax(140px, 1fr) 3fr 42px; gap: 10px; align-items: center; margin-bottom: 8px; font-size: 14px; }
    .bar-track { background: var(--line); border-radius: 999px; height: 12px; overflow: hidden; }
    .bar-fill { background: linear-gradient(90deg, var(--green), var(--yellow)); height: 100%; border-radius: 999px; }
    .bar-count { text-align: right; font-weight: 600; color: var(--ink-soft); }
    .q-block { border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 16px; background: #fff; }
    .q-block h3 { font: 600 15px 'Inter', sans-serif; margin-bottom: 12px; color: var(--ink); }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .pill.customer { background: var(--green-soft); color: var(--green-dark); }
    .pill.shop_owner { background: #fef3c7; color: #92400e; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .empty { color: var(--ink-soft); padding: 24px 0; text-align: center; }
    .table-wrap { overflow-x: auto; }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">iS</span>
      <span class="brand-name">iSoko <em>Survey Admin</em></span>
    </div>
    <div class="toolbar">
      <a class="btn btn-ghost" href="/" style="text-decoration:none">Survey</a>
      <button class="btn btn-primary" id="exportBtn">Export CSV</button>
    </div>
  </header>

  <main class="card">
    <h1>Response Dashboard</h1>
    <div class="stat-grid" id="stats"></div>

    <h2>Answers by question</h2>
    <div id="charts"></div>

    <h2>All responses</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Role</th><th>Lang</th><th>Name</th><th>Phone</th><th>District</th><th>Answers</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p class="empty" id="empty" hidden>No responses yet. Share the survey link to start collecting feedback.</p>
  </main>

  <script>
    const key = new URLSearchParams(location.search).get('key') || '';
    const qs = key ? '?key=' + encodeURIComponent(key) : '';

    document.getElementById('exportBtn').addEventListener('click', () => {
      location.href = '/api/export.csv' + qs;
    });

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function load() {
      const [statsRes, listRes] = await Promise.all([
        fetch('/api/stats' + qs),
        fetch('/api/responses' + qs),
      ]);
      if (statsRes.status === 401 || listRes.status === 401) {
        document.querySelector('.card').innerHTML =
          '<h1>Unauthorized</h1><p class="intro">Add <code>?key=YOUR_ADMIN_KEY</code> to the URL.</p>';
        return;
      }
      const stats = await statsRes.json();
      const { responses } = await listRes.json();

      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="num">${stats.total}</div><div class="lbl">Total responses</div></div>
        <div class="stat"><div class="num">${stats.by_role.customer}</div><div class="lbl">Customers</div></div>
        <div class="stat"><div class="num">${stats.by_role.shop_owner}</div><div class="lbl">Shop owners</div></div>
        <div class="stat"><div class="num">${stats.by_language.en} / ${stats.by_language.rw}</div><div class="lbl">English / Kinyarwanda</div></div>
        <div class="stat"><div class="num">${stats.contact_ok}</div><div class="lbl">OK to contact</div></div>`;

      const charts = document.getElementById('charts');
      charts.innerHTML = '';
      for (const [question, options] of Object.entries(stats.answer_counts)) {
        const entries = Object.entries(options).sort((a, b) => b[1] - a[1]);
        const max = Math.max(...entries.map(([, n]) => n), 1);
        const block = document.createElement('div');
        block.className = 'q-block';
        block.innerHTML =
          '<h3>' + esc(question.replace(/_/g, ' ')) + '</h3>' +
          entries.map(([opt, n]) => `
            <div class="bar-row">
              <span>${esc(opt)}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${(n / max) * 100}%"></div></div>
              <span class="bar-count">${n}</span>
            </div>`).join('');
        charts.appendChild(block);
      }
      if (!Object.keys(stats.answer_counts).length) {
        charts.innerHTML = '<p class="empty">No answer data yet.</p>';
      }

      const rows = document.getElementById('rows');
      rows.innerHTML = responses
        .slice()
        .reverse()
        .map((r) => {
          const answers = Object.entries(r.answers || {})
            .map(([k, v]) => `<strong>${esc(k)}:</strong> ${esc(Array.isArray(v) ? v.join('; ') : v)}`)
            .join('<br>');
          return `<tr>
            <td>${esc((r.submitted_at || '').slice(0, 16).replace('T', ' '))}</td>
            <td><span class="pill ${esc(r.role)}">${r.role === 'shop_owner' ? 'Shop owner' : 'Customer'}</span></td>
            <td>${esc(r.language)}</td>
            <td>${esc(r.name)}</td>
            <td>${esc(r.phone)}</td>
            <td>${esc(r.district)}</td>
            <td>${answers}</td>
          </tr>`;
        })
        .join('');
      document.getElementById('empty').hidden = responses.length > 0;
    }

    load();
  </script>
</body>
</html>
